<main class="how-to-order-body">
  <section class="how-to-order-content">
    <div class="category-grid">
      @for (category of categories; track category.slug) {
        <app-category-card
          [title]="category.title"
          [image]="category.image"
          [slug]="category.slug"
        />
      }
    </div>
  </section>
</main>
