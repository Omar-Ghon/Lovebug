<main class="how-to-order-body">
  <section class="how-to-order-content">
    <div class="how-to-order-intro">
      <h1 class="how-to-order-title">Choose a category below</h1>

      <div class="how-to-order-notice">
        <span class="how-to-order-notice-label">Please note:</span>
        Orders will begin fulfillment on <strong> <br> April 17</strong>!
      </div>
    </div>

    @if (isLoading) {
      <p class="how-to-order-status">Loading categories...</p>
    } @else if (errorMessage) {
      <p class="how-to-order-status how-to-order-status--error">
        {{ errorMessage }}
      </p>
    } @else {
      <div class="category-grid">
        @for (category of categories; track $index) {
          <app-category-card
            [title]="category.title"
            [image]="category.image"
            [slug]="category.slug"
          />
        }
      </div>
    }
  </section>
</main>
