<header class="site-header">
  <div class="header-inner">
    <button
      class="menu-toggle"
      type="button"
      aria-label="Toggle menu"
      [attr.aria-expanded]="menuOpen"
      [class.is-open]="menuOpen"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <a class="logo-link" routerLink="/" aria-label="Home" (click)="closeMenu()">
      <img class="logo-img" src="assets/icons/logo.png" alt="Logo" />
    </a>

    <nav class="nav-desktop" aria-label="Primary navigation">
      <a
        class="nav-link"
        routerLink="/"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        How to Order
        <img src="assets/images/green-star.png" alt="Green star" class="nav-img" />
      </a>

      <a
        class="nav-link"
        routerLink="/past-work"
        routerLinkActive="is-active"
      >
        Portfolio
        <img src="assets/images/blue-star.png" alt="Blue star" class="nav-img" />
      </a>

      <a
        class="nav-link"
        routerLink="/work"
        routerLinkActive="is-active"
      >
        About Me
        <img src="assets/images/pink-star.png" alt="Pink star" class="nav-img" />
      </a>
    </nav>
  </div>

  <nav
    class="nav-mobile"
    aria-label="Mobile navigation"
    [class.is-open]="menuOpen"
  >
    <a
      class="nav-link"
      routerLink="/"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="closeMenu()"
    >
      How to Order
      <img src="assets/images/green-star.png" alt="Green star" class="nav-img" />
    </a>

    <a
      class="nav-link"
      routerLink="/past-work"
      routerLinkActive="is-active"
      (click)="closeMenu()"
    >
      Portfolio
      <img src="assets/images/blue-star.png" alt="Blue star" class="nav-img" />
    </a>

    <a
      class="nav-link"
      routerLink="/work"
      routerLinkActive="is-active"
      (click)="closeMenu()"
    >
      About Me
      <img src="assets/images/pink-star.png" alt="Pink star" class="nav-img" />
    </a>
  </nav>
</header>
